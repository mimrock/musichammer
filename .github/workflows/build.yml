# Builds the installers on GitHub-hosted runners. In the public repo this is
# also the provenance story for the unsigned binaries: anyone can trace a
# release asset to this workflow run and the source it built.
#
# Runs on manual dispatch (test builds) and on v* tags (release builds — the
# tag run also attaches the artifacts to a GitHub Release).
name: build

on:
  workflow_dispatch:
  push:
    tags: ['v*']

permissions:
  contents: write # create the release + upload assets on tag builds

jobs:
  build:
    strategy:
      fail-fast: false # let the other OS finish so one run surfaces both platforms' errors
      matrix:
        include:
          - os: ubuntu-latest
            args: --linux
          - os: windows-latest
            args: --win
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # --publish never: electron-builder 26 auto-publishes whenever it detects
      # CI (it fails the build if no GH_TOKEN is set, even off-tag); publishing
      # is the release job's responsibility, not the build's
      - run: npx electron-builder ${{ matrix.args }} --publish never
      - uses: actions/upload-artifact@v4
        with:
          name: installers-${{ matrix.os }}
          path: |
            dist/*.AppImage
            dist/*.deb
            dist/*.exe
            dist/*.blockmap
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          draft: true # human looks before it goes live
