# Builds the installers on GitHub-hosted runners. In the public repo this is
# also the provenance story for the unsigned binaries: anyone can trace a
# release asset to this workflow run and the source it built.
#
# Runs on manual dispatch (test builds) and on v* tags (release builds — the
# tag run also attaches the artifacts to a GitHub Release).
name: build

on:
  workflow_dispatch:
  push:
    tags: ['v*']

permissions:
  contents: write # create the release + upload assets on tag builds

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            args: --linux
          - os: windows-latest
            args: --win
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx electron-builder ${{ matrix.args }}
        env:
          # electron-builder would otherwise try to auto-publish on tag builds;
          # publishing is the release step's job, not the build's
          EP_DRAFT: 'false'
      - uses: actions/upload-artifact@v4
        with:
          name: installers-${{ matrix.os }}
          path: |
            dist/*.AppImage
            dist/*.deb
            dist/*.exe
            dist/*.blockmap
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          draft: true # human looks before it goes live
